<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mehtab Alam CV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #f7f7f4;
      color: #151515;
      font-family: Poppins, Arial, sans-serif;
    }

    .cv-page {
      width: min(900px, calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0;
    }

    .cv-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.1;
    }

    .download-btn {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border: 1px solid #151515;
      border-radius: 4px;
      background: #151515;
      color: white;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .cv-frame {
      display: flex;
      max-width: 100%;
      height: calc(100vh - 104px);
      margin: 0 auto;
      justify-content: center;
      padding: 0;
    }

    .cv-frame img {
      display: block;
      width: auto;
      max-width: 100%;
      height: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .cv-frame img:hover {
      transform: scale(1.03);
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.14);
    }

    @media (max-width: 560px) {
      .cv-topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .download-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="cv-page">
    <div class="cv-topbar">
      <h1>Mehtab Alam CV</h1>
      <a class="download-btn" href="cv.png" download="Mehtab-Alam-CV.png">Download CV</a>
    </div>

    <div class="cv-frame">
      <img src="cv.png" alt="Mehtab Alam CV">
    </div>
  </main>
</body>
</html>
